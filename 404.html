<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada · Juan Ramón Páez</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#1F5B7A">
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <style>
    :root {
      --paper: #FAF3E7; --ink: #33261A; --ink-soft: #6B5743;
      --terracotta: #C2552F; --azulejo: #1F5B7A; --mustard: #D9A33C;
    }
    * { margin: 0; box-sizing: border-box; }
    body {
      min-height: 100vh; display: grid; place-items: center;
      padding: 2rem; text-align: center;
      font-family: 'Karla', 'Segoe UI', sans-serif;
      color: var(--ink); background: var(--paper);
    }
    .code {
      font-family: Georgia, serif; font-weight: 800; font-style: italic;
      font-size: clamp(4rem, 18vw, 9rem); line-height: 1; color: var(--terracotta);
    }
    h1 { font-family: Georgia, serif; font-size: clamp(1.3rem, 4vw, 1.9rem); margin: .6rem 0 .4rem; }
    p { color: var(--ink-soft); max-width: 42ch; margin: 0 auto 1.8rem; }
    .home {
      display: inline-block; text-decoration: none; font-weight: 700;
      color: #FFFDF7; background: var(--terracotta);
      border: 2px solid var(--terracotta); padding: .7rem 1.5rem;
      box-shadow: 4px 4px 0 var(--mustard); transition: transform .2s ease;
    }
    .home:hover { transform: translate(-2px, -2px); }
  </style>
</head>
<body>
  <main>
    <div class="code">404</div>
    <h1>Esta tesela no existe</h1>
    <p>La página que buscas se ha perdido entre los olivos. Volvamos al mosaico.</p>
    <a class="home" href="/">Volver a la portada</a>
  </main>
</body>
</html>
